<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Trade Replay">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#19E6C3"/>
      <stop offset="1" stop-color="#21A4F0"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#33BBCD"/>
      <stop offset="1" stop-color="#33A0FF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="32" cy="32" r="29" fill="#07162D"/>

  <g filter="url(#glow)">
    <path d="M32 7a25 25 0 0 1 16.4 6.1l3.4-2.1-1.1 9-8.8-1.4 3.1-1.8A21 21 0 0 0 11.2 31" fill="none" stroke="url(#ringGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="8s" repeatCount="indefinite"/>
    </path>

    <path d="M8.8 33a23.4 23.4 0 0 0 38.9 17.9l3.3 2.2-1.4-9-8.9 1.1 3.2 1.9A19.4 19.4 0 0 1 12.7 33" fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M18 39l9-8 6 3 6-7 7-9" fill="none" stroke="url(#lineGrad)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="stroke-dasharray" values="0 60;60 0;60 0" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;0;-60" dur="2.8s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
