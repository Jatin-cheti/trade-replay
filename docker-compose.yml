services:
  mongodb:
    image: mongo:7
    container_name: tradereplay-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7
    container_name: tradereplay-redis
    restart: always
    command: ["redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.10
    container_name: tradereplay-kafka
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradereplay-backend
    restart: unless-stopped
    env_file:
      - ./.env
      - ./.env.secrets
    environment:
      APP_ENV: docker
      KAFKA_ENABLED: "true"
      BACKEND_URL: http://127.0.0.1:4000
      CHART_SERVICE_ENABLED: "true"
      CHART_SERVICE_URL: http://chart-service:3009
      CHART_SERVICE_AUTH_ENABLED: "false"
    ports:
      - "4000:4000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradereplay-worker
    restart: unless-stopped
    command: npm run start:worker
    env_file:
      - ./.env
      - ./.env.secrets
    environment:
      APP_ENV: docker
      KAFKA_ENABLED: "true"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  logo-service:
    build:
      context: ./services/logo-service
    container_name: tradereplay-logo-service
    restart: unless-stopped
    command: npm run start
    env_file:
      - ./.env
      - ./.env.secrets
    environment:
      APP_ENV: docker
      KAFKA_ENABLED: "true"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      worker:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  kafka-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradereplay-kafka-service
    restart: unless-stopped
    command: npm run start:kafka
    env_file:
      - ./.env
      - ./.env.secrets
    environment:
      APP_ENV: docker
      KAFKA_ENABLED: "true"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  chart-service:
    build:
      context: ./services/chart-service
      dockerfile: Dockerfile
    container_name: tradereplay-chart-service
    restart: unless-stopped
    command: npm run start
    env_file:
      - ./.env
      - ./.env.secrets
    environment:
      APP_ENV: docker
      PORT: 3009
      BACKEND_URL: http://backend:4000
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    ports:
      - "3009:3009"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3009/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M

  prometheus:
    image: prom/prometheus:latest
    container_name: tradereplay-prometheus
    restart: unless-stopped
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    container_name: tradereplay-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:?Set GF_ADMIN_PASSWORD in .env}
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

  # global-expansion: REMOVED from always-on containers.
  # Run manually: docker-compose run --rm backend npm run ingest:global:infinite

  # ─── Microservices ─────────────────────────────────────

  asset-service:
    build:
      context: ./services/asset-service
    container_name: tradereplay-asset-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./.env.secrets
    environment:
      APP_ENV: docker
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  screener-service:
    build:
      context: ./services/screener-service
    container_name: tradereplay-screener-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./.env.secrets
    environment:
      APP_ENV: docker
      PORT: 3004
    ports:
      - "3004:3004"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  alert-service:
    build:
      context: ./services/alert-service
    container_name: tradereplay-alert-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./.env.secrets
    environment:
      APP_ENV: docker
      PORT: 3005
    ports:
      - "3005:3005"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  portfolio-service:
    build:
      context: ./services/portfolio-service
    container_name: tradereplay-portfolio-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./.env.secrets
    environment:
      APP_ENV: docker
      PORT: 3006
    ports:
      - "3006:3006"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  simulation-service:
    build:
      context: ./services/simulation-service
    container_name: tradereplay-simulation-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./.env.secrets
    environment:
      APP_ENV: docker
      PORT: 3007
    ports:
      - "3007:3007"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  datafeed-service:
    build:
      context: ./services/datafeed-service
    container_name: tradereplay-datafeed-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./.env.secrets
    environment:
      APP_ENV: docker
      PORT: 3008
    ports:
      - "3008:3008"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3008/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  mongo_data:
    external: true
    name: tradereplay_mongo_data
