services:
  mongodb:
    image: mongo:7
    container_name: tradereplay-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7
    container_name: tradereplay-redis
    restart: always
    command:
      - redis-server
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.10
    container_name: tradereplay-kafka
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradereplay-backend
    restart: unless-stopped
    env_file:
      - ./.env
      - ./.env.secrets
    environment:
      APP_ENV: docker
      KAFKA_ENABLED: "true"
      MONGO_URI_DOCKER: mongodb://mongodb:27017/tradereplay
      REDIS_URL_DOCKER: redis://redis:6379
      KAFKA_BROKER_DOCKER: kafka:9092
      BACKEND_URL: http://127.0.0.1:4000
    ports:
      - "4000:4000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradereplay-worker
    restart: unless-stopped
    command: npm run start:worker
    env_file:
      - ./.env
      - ./.env.secrets
    environment:
      APP_ENV: docker
      KAFKA_ENABLED: "true"
      MONGO_URI_DOCKER: mongodb://mongodb:27017/tradereplay
      REDIS_URL_DOCKER: redis://redis:6379
      KAFKA_BROKER_DOCKER: kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  logo-service:
    build:
      context: ./services/logo-service
    container_name: tradereplay-logo-service
    restart: unless-stopped
    profiles: ["logo"]
    command: npm run start
    env_file:
      - ./.env
      - ./.env.secrets
    environment:
      APP_ENV: docker
      KAFKA_ENABLED: "true"
      MONGO_URI_DOCKER: mongodb://mongodb:27017/tradereplay
      REDIS_URL_DOCKER: redis://redis:6379
      KAFKA_BROKER_DOCKER: kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  kafka-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradereplay-kafka-service
    restart: unless-stopped
    command: npm run start:kafka
    env_file:
      - ./.env
      - ./.env.secrets
    environment:
      APP_ENV: docker
      KAFKA_ENABLED: "true"
      MONGO_URI_DOCKER: mongodb://mongodb:27017/tradereplay
      REDIS_URL_DOCKER: redis://redis:6379
      KAFKA_BROKER_DOCKER: kafka:9092
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  chart-service:
    build:
      context: ./services/chart-service
      dockerfile: Dockerfile
    container_name: tradereplay-chart-service
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PORT: "3001"
      APP_ENV: docker
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      BACKEND_URL: http://backend:4000
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    image: nginx:alpine
    container_name: tradereplay-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_started
      chart-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: tradereplay-prometheus
    restart: unless-stopped
    profiles: ["tools"]
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    container_name: tradereplay-grafana
    restart: unless-stopped
    profiles: ["tools"]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin123}
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: tradereplay-jenkins
    restart: unless-stopped
    profiles: ["tools"]
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    depends_on:
      backend:
        condition: service_started

  global-expansion:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradereplay-global-expansion
    restart: "no"
    command: npm run ingest:global:once
    env_file:
      - ./.env
      - ./.env.secrets
    environment:
      APP_ENV: docker
      KAFKA_ENABLED: "true"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mongo_data:
    external: true
    name: tradereplay_mongo_data
  jenkins_home:
