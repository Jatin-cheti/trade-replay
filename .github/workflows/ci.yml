name: CI Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mongodb:
        image: mongo:6.0
        ports: [27017:27017]
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install
        run: npm ci || npm install

      - name: Unit tests
        run: |
          if grep -q "\"test\"" package.json; then
            npm test -- --ci --forceExit 2>&1 | tee reports/unit_test_loop5.txt
          else
            echo "::warning::No test script configured"
          fi
        env:
          MONGODB_URI: mongodb://localhost:27017/tradereplay_test
          NODE_ENV: test
        continue-on-error: true

      - name: API key validation (warn-only)
        run: node scripts/lib/validate-api-keys.cjs --warn
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        continue-on-error: true

      - name: Historical credential check
        run: |
          COUNT=$(git log --all -p 2>/dev/null | grep -c "***REDACTED_AV_KEY***" || echo 0)
          echo "::notice::Historical leaked-credential occurrences: $COUNT"
          # SEC-006 force-push pending — do not fail on this yet; just surface the number.

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: reports/unit_test_*.txt

  security-scan:
    name: Security Scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  lint-workflow:
    name: Validate workflow YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-check
          fail_on_error: false

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci || npm install
      - name: Build
        run: npm run build
      - name: Upload bundle stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 3

  prod-smoke:
    name: Prod HTTP smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Hit public endpoints
        run: |
          set -e
          ok=0; fail=0
          check() {
            local url="$1"; local label="$2"
            local code
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 "$url" || echo 000)
            if [[ "$code" == "200" ]]; then echo "PASS $label $code"; ok=$((ok+1));
            else echo "FAIL $label $code"; fail=$((fail+1)); fi
          }
          check https://tradereplay.me/ home
          check https://tradereplay.me/screener/stocks screener
          check "https://tradereplay.me/symbol/NSE%3ARELIANCE" symbolRELIANCE
          check "https://api.tradereplay.me/api/screener/list?type=stocks&limit=1" apiList
          check "https://api.tradereplay.me/api/screener/symbol/NSE%3ARELIANCE" apiSymbol
          echo "prod smoke: PASS=$ok FAIL=$fail"
          test "$fail" -eq 0
