upstream backend_core {
    server 127.0.0.1:4000;
}

upstream asset_service {
    server 127.0.0.1:3002;
}

upstream logo_service {
    server 127.0.0.1:3003;
}

upstream screener_service {
    server 127.0.0.1:3004;
}

upstream alert_service {
    server 127.0.0.1:3005;
}

upstream portfolio_service {
    server 127.0.0.1:3006;
}

upstream simulation_service {
    server 127.0.0.1:3007;
}

upstream datafeed_service {
    server 127.0.0.1:3008;
}

server {
    listen 80;
    server_name api.tradereplay.me;

    # Health check for nginx itself
    location /health {
        return 200 '{"ok":true,"service":"gateway"}';
        add_header Content-Type application/json;
    }

    # ─── Microservice routes ────────────────────────────────

    # Asset / Symbol service
    location /api/symbols {
        proxy_pass http://asset_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/assets {
        proxy_pass http://asset_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Screener service
    location /api/screener {
        proxy_pass http://screener_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Alert service
    location /api/alerts {
        proxy_pass http://alert_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Portfolio service
    location /api/portfolios {
        proxy_pass http://portfolio_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Simulation service
    location /api/simulation {
        proxy_pass http://simulation_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Datafeed (TradingView UDF)
    location /api/datafeed {
        proxy_pass http://datafeed_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Backend core (auth, socket.io, everything else) ───

    # Socket.IO
    location /socket.io/ {
        proxy_pass http://backend_core;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # All other API routes fall through to backend core
    location /api/ {
        proxy_pass http://backend_core;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default fallback
    location / {
        proxy_pass http://backend_core;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
