#cloud-config
package_update: true
package_upgrade: true

packages:
  - curl
  - git
  - nginx
  - ufw
  - redis-server
  - openjdk-17-jre-headless
  - snapd

swap:
  filename: /swapfile
  size: 1073741824
  maxsize: 1073741824

write_files:
  - path: /etc/redis/redis-tradereplay.conf
    permissions: "0644"
    content: |
      bind 127.0.0.1 ::1
      port 6379
      maxmemory 100mb
      maxmemory-policy allkeys-lru
      save 900 1
      save 300 10
      save 60 10000
      dir /var/lib/redis
      loglevel notice
      logfile /var/log/redis/redis-server.log

  - path: /opt/setup-app.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      exec > /var/log/tradereplay-setup.log 2>&1
      echo "=== Trade Replay Setup $(date) ==="

      # ---- Swap tuning ----
      sysctl vm.swappiness=10
      echo 'vm.swappiness=10' >> /etc/sysctl.conf

      # ---- Node.js 20 LTS ----
      if ! command -v node &> /dev/null; then
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
        apt-get install -y nodejs
      fi
      echo "Node.js $(node -v)"

      # ---- PM2 ----
      npm install -g pm2
      pm2 startup systemd -u root --hp /root

      # ---- Redis ----
      cp /etc/redis/redis-tradereplay.conf /etc/redis/redis.conf
      systemctl enable redis-server
      systemctl restart redis-server
      echo "Redis: $(redis-cli ping)"

      # ---- Kafka KRaft ----
      KAFKA_VERSION="3.7.0"
      KAFKA_DIR="/opt/kafka"
      if [ ! -d "${KAFKA_DIR}" ]; then
        cd /tmp
        curl -fsSL "https://downloads.apache.org/kafka/${KAFKA_VERSION}/kafka_2.13-${KAFKA_VERSION}.tgz" -o kafka.tgz
        mkdir -p "${KAFKA_DIR}"
        tar -xzf kafka.tgz -C "${KAFKA_DIR}" --strip-components=1
        rm -f kafka.tgz
      fi
      mkdir -p /var/lib/kafka /var/log/kafka

      KRAFT_CLUSTER_ID=$("${KAFKA_DIR}/bin/kafka-storage.sh" random-uuid)

      cat > "${KAFKA_DIR}/config/kraft/server.properties" << 'KEOF'
      process.roles=broker,controller
      node.id=1
      controller.quorum.voters=1@localhost:9093
      listeners=PLAINTEXT://:9092,CONTROLLER://:9093
      advertised.listeners=PLAINTEXT://localhost:9092
      controller.listener.names=CONTROLLER
      inter.broker.listener.name=PLAINTEXT
      listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      log.dirs=/var/lib/kafka
      num.partitions=1
      default.replication.factor=1
      offsets.topic.replication.factor=1
      transaction.state.log.replication.factor=1
      transaction.state.log.min.isr=1
      log.retention.hours=24
      log.segment.bytes=268435456
      log.retention.check.interval.ms=300000
      replica.fetch.max.bytes=1048576
      fetch.max.bytes=1048576
      auto.create.topics.enable=false
      delete.topic.enable=true
      KEOF

      # Remove leading whitespace from heredoc
      sed -i 's/^      //' "${KAFKA_DIR}/config/kraft/server.properties"

      "${KAFKA_DIR}/bin/kafka-storage.sh" format -t "${KRAFT_CLUSTER_ID}" -c "${KAFKA_DIR}/config/kraft/server.properties"

      cat > /etc/systemd/system/kafka.service << SEOF
      [Unit]
      Description=Apache Kafka (KRaft)
      After=network.target

      [Service]
      Type=simple
      User=root
      Environment="KAFKA_HEAP_OPTS=-Xmx128m -Xms128m"
      ExecStart=${KAFKA_DIR}/bin/kafka-server-start.sh ${KAFKA_DIR}/config/kraft/server.properties
      ExecStop=${KAFKA_DIR}/bin/kafka-server-stop.sh
      Restart=on-failure
      RestartSec=10
      LimitNOFILE=100000

      [Install]
      WantedBy=multi-user.target
      SEOF

      sed -i 's/^      //' /etc/systemd/system/kafka.service
      systemctl daemon-reload
      systemctl enable kafka
      systemctl start kafka
      echo "Kafka started with cluster ID: ${KRAFT_CLUSTER_ID}"

      # ---- Firewall ----
      ufw allow OpenSSH
      ufw allow 'Nginx Full'
      ufw --force enable

      # ---- Clone repo ----
      mkdir -p /opt/tradereplay /var/log/tradereplay
      if [ ! -d "/opt/tradereplay/.git" ]; then
        git clone https://github.com/Jatin-cheti/trade-replay.git /opt/tradereplay
      fi

      # ---- Install backend deps ----
      cd /opt/tradereplay/backend
      npm ci --omit=dev

      # ---- Nginx ----
      cp /opt/tradereplay/deploy/nginx/tradereplay.conf /etc/nginx/sites-available/tradereplay
      ln -sf /etc/nginx/sites-available/tradereplay /etc/nginx/sites-enabled/tradereplay
      rm -f /etc/nginx/sites-enabled/default
      nginx -t && systemctl restart nginx

      # ---- Signal done ----
      echo "=== SETUP COMPLETE $(date) ==="
      touch /opt/tradereplay/.setup-done

runcmd:
  - bash /opt/setup-app.sh
